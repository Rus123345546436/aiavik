<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVIATOR PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white font-sans">
    <div class="max-w-sm mx-auto p-6 min-h-screen flex flex-col justify-center">
        
        <!-- Шаг 1 -->
        <div id="step1" class="text-center">
            <h1 class="text-4xl font-black mb-8 text-blue-500 italic">AVIATOR PRO</h1>
            <button id="btnStart" class="w-full bg-blue-600 py-4 rounded-lg font-bold text-lg hover:bg-blue-500 transition">
                START ENGINE
            </button>
        </div>

        <!-- Шаг 2 -->
        <div id="step2" class="hidden text-center">
            <div class="animate-pulse text-blue-400 font-bold text-xl">SCANNING DATABASE...</div>
        </div>

        <!-- Шаг 3 -->
        <div id="step3" class="hidden text-center border border-red-500/30 p-6 rounded-xl bg-red-900/10">
            <h2 class="text-xl font-bold mb-4 text-red-500">⚠ ACCOUNT NOT FOUND</h2>
            <p class="text-sm mb-6">Your account is not linked to Aviator Pro. Use promo code <span class="font-bold text-white">Naushad777</span> during registration to activate access.</p>
            
            <!-- Прямая ссылка -->
            <a href="https://reffpa.com/L?tag=d_3400714m_32273c_&site=3400714&ad=32273&r=registration" 
               class="block w-full bg-blue-600 py-4 rounded-lg font-bold text-white text-center hover:bg-blue-700 transition shadow-lg">
                REGISTER NOW
            </a>
        </div>
    </div>

    <script>
        document.getElementById('btnStart').onclick = function() {
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
            
            setTimeout(() => {
                document.getElementById('step2').classList.add('hidden');
                document.getElementById('step3').classList.remove('hidden');
            }, 3000);
        };
    </script>
</body>
</html>
