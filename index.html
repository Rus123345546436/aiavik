<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviator Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white font-sans">
    <div class="max-w-sm mx-auto p-6 min-h-screen flex flex-col justify-center">
        
        <!-- Шаг 1: Главный экран -->
        <div id="step1" class="text-center space-y-6">
            <h1 class="text-3xl font-black">AVIATOR ENGINE</h1>
            <p class="text-slate-400">Enter your Gaming ID to start synchronization</p>
            <input id="userId" type="number" placeholder="Enter your ID" class="w-full bg-[#111] border border-slate-700 p-4 rounded-xl text-center focus:border-blue-500 outline-none">
            <button id="btnStart" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-bold uppercase tracking-widest transition">Start Analysis</button>
        </div>

        <!-- Шаг 2: Загрузка -->
        <div id="step2" class="hidden text-center space-y-4">
            <div class="animate-pulse text-blue-500 text-xl font-bold">Analyzing...</div>
            <div class="w-full bg-slate-800 h-2 rounded-full overflow-hidden">
                <div class="h-full bg-blue-500 animate-[loading_2s_ease-in-out_infinite]"></div>
            </div>
        </div>

        <!-- Шаг 3: Ошибка (Call to Action) -->
        <div id="step3" class="hidden bg-[#0d0d0d] border border-red-900/50 p-8 rounded-2xl text-center space-y-6">
            <div class="text-red-500 text-5xl">⚠</div>
            <div>
                <h2 class="text-xl font-bold">Account Not Found</h2>
                <p class="text-slate-400 text-sm mt-2">Your ID is not registered in our signal database. Please register with our partner to activate access.</p>
            </div>
            <a href="https://reffpa.com/L?tag=d_3400714m_32273c_&site=3400714&ad=32273&r=registration" 
               class="block bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-bold">REGISTER NOW</a>
            <p class="text-[10px] text-slate-600">Use promo code: <span class="text-white">Naushad777</span></p>
        </div>

    </div>

    <style>
        @keyframes loading { 0% { width: 0%; } 100% { width: 100%; } }
    </style>

    <script>
        const btnStart = document.getElementById('btnStart');
        const step1 = document.getElementById('step1');
        const step2 = document.getElementById('step2');
        const step3 = document.getElementById('step3');

        btnStart.addEventListener('click', () => {
            if(document.getElementById('userId').value.length < 3) return alert('Enter ID');
            
            step1.classList.add('hidden');
            step2.classList.remove('hidden');

            setTimeout(() => {
                step2.classList.add('hidden');
                step3.classList.remove('hidden');
            }, 2500);
        });
    </script>
</body>
</html>
